name: tests

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "Cargo.*"
      - ".github/workflows/test.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "Cargo.*"
      - ".github/workflows/test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

  bench:
    name: bench
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          toolchain: stable

      - name: Benchmark
        run: cargo bench --bench engine

      - name: Summarise results
        run: |
          ESTIMATES="target/criterion/pecrab_engine/sample_01/new/estimates.json"

          fmt_ns() {
            awk -v v="$1" 'BEGIN {
              if      (v < 1000)       printf "%.1f ns",  v
              else if (v < 1000000)    printf "%.2f µs",  v / 1000
              else if (v < 1000000000) printf "%.2f ms",  v / 1000000
              else                     printf "%.3f s",   v / 1000000000
            }'
          }

          mean=$(jq   '.mean.point_estimate'                     "$ESTIMATES")
          mean_lo=$(jq '.mean.confidence_interval.lower_bound'   "$ESTIMATES")
          mean_hi=$(jq '.mean.confidence_interval.upper_bound'   "$ESTIMATES")
          median=$(jq  '.median.point_estimate'                  "$ESTIMATES")
          std=$(jq     '.std_dev.point_estimate'                 "$ESTIMATES")

          {
            echo "## Benchmark — pecrab_engine / sample_01"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Mean     | $(fmt_ns "$mean")    |"
            echo "| CI 95%   | $(fmt_ns "$mean_lo") … $(fmt_ns "$mean_hi") |"
            echo "| Median   | $(fmt_ns "$median")  |"
            echo "| Std dev  | $(fmt_ns "$std")     |"
            echo ""
            echo "> Full HTML report (with graphs) is available in the **criterion-report** artifact below."
          } >> "$GITHUB_STEP_SUMMARY"
